<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FileDrop // SECURE TRANSFER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #0f0f0f;
    --surface-high: #161616;
    --green: #00FF41;
    --green-dim: rgba(0, 255, 65, 0.08);
    --green-glow: rgba(0, 255, 65, 0.3);
    --red: #FF0033;
    --red-dim: rgba(255, 0, 51, 0.1);
    --amber: #FFB000;
    --amber-dim: rgba(255, 176, 0, 0.1);
    --cyan: #00E5FF;
    --text: #C0C0C0;
    --muted: #555;
    --border: #1a1a1a;
    --font: 'JetBrains Mono', 'Share Tech Mono', 'Courier New', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  /* ── Scanline Overlay ─────────────────────────────── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.03) 0px,
      rgba(0,0,0,0.03) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Matrix Rain Canvas ───────────────────────────── */
  #matrix {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.06;
    pointer-events: none;
  }

  /* ── Header ───────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--green);
    box-shadow: 0 1px 20px rgba(0,255,65,0.05);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-bracket { color: var(--green); font-size: 18px; font-weight: 700; }

  .logo-text {
    font-size: 16px;
    font-weight: 700;
    color: var(--green);
    text-shadow: 0 0 10px var(--green-glow);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .logo-ver {
    font-size: 10px;
    color: var(--muted);
    margin-left: 4px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border: 1px solid var(--muted);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }

  .status-pill.connecting {
    border-color: var(--amber);
    color: var(--amber);
  }

  .status-pill.connected {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 8px rgba(0,255,65,0.15);
  }

  .status-pill.disconnected {
    border-color: var(--red);
    color: var(--red);
  }

  .status-dot {
    width: 6px; height: 6px;
    background: currentColor;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ── Content ──────────────────────────────────────── */
  .content {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* ── Drop Zone ────────────────────────────────────── */
  .drop-zone {
    border: 1px solid #222;
    padding: 32px 20px;
    text-align: center;
    background: var(--surface);
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
  }

  .drop-zone::before {
    content: '>';
    position: absolute;
    top: 8px; left: 10px;
    color: var(--green);
    font-size: 12px;
    animation: blink 1s step-end infinite;
  }

  .drop-zone.dragover {
    border-color: var(--green);
    background: var(--green-dim);
    box-shadow: 0 0 30px rgba(0,255,65,0.08);
  }

  .drop-zone-icon {
    font-size: 36px;
    margin-bottom: 8px;
    display: block;
    filter: hue-rotate(90deg) brightness(1.5);
  }

  .drop-zone-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
    text-shadow: 0 0 8px var(--green-glow);
  }

  .drop-zone-subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .file-input { display: none; }

  .select-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    padding: 10px 24px;
    background: transparent;
    color: var(--green);
    border: 1px solid var(--green);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 1px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .select-btn:hover, .select-btn:active {
    background: var(--green);
    color: #000;
    box-shadow: 0 0 20px var(--green-glow);
  }

  /* ── Section Headers ──────────────────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .section-title::before { content: '[ '; color: var(--muted); }
  .section-title::after { content: ' ]'; color: var(--muted); }

  .queue-stats {
    font-size: 10px;
    color: var(--muted);
  }

  /* ── File Queue ───────────────────────────────────── */
  .queue-section { display: none; }
  .queue-section.visible { display: block; }

  .file-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .file-item {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: fadeIn 0.2s ease;
    position: relative;
  }

  .file-item::before {
    content: '>';
    position: absolute;
    left: -14px;
    top: 12px;
    color: var(--muted);
    font-size: 10px;
    display: none;
  }

  .file-item.active { border-color: var(--green); }
  .file-item.active::before { display: block; color: var(--green); }
  .file-item.completed { border-color: rgba(0,255,65,0.2); }
  .file-item.failed { border-color: rgba(255,0,51,0.3); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-4px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .file-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .file-name {
    font-size: 12px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    color: var(--text);
  }

  .file-name span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-size {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    margin-left: 8px;
  }

  .file-progress-bar {
    height: 3px;
    background: #1a1a1a;
    overflow: hidden;
  }

  .file-progress-fill {
    height: 100%;
    background: var(--green);
    transition: width 0.15s linear;
    box-shadow: 0 0 6px var(--green-glow);
  }

  .file-item.completed .file-progress-fill {
    background: var(--green);
  }

  .file-item.failed .file-progress-fill {
    background: var(--red);
    box-shadow: 0 0 6px rgba(255,0,51,0.3);
  }

  .file-status {
    font-size: 10px;
    color: var(--muted);
  }

  .file-status.hashing { color: var(--amber); }
  .file-status.sending { color: var(--green); }
  .file-status.done { color: var(--green); text-shadow: 0 0 4px var(--green-glow); }
  .file-status.error { color: var(--red); }

  /* ── Send Button ──────────────────────────────────── */
  .send-section { display: none; }

  .send-section.visible {
    display: flex;
    gap: 8px;
  }

  .send-btn {
    flex: 1;
    padding: 14px;
    border: none;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .send-btn.primary {
    background: var(--green);
    color: #000;
    box-shadow: 0 0 20px var(--green-glow);
  }

  .send-btn.primary:hover {
    box-shadow: 0 0 40px var(--green-glow);
  }

  .send-btn.primary:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .send-btn.secondary {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    flex: 0 0 auto;
    padding: 14px 18px;
  }

  /* ── Progress ─────────────────────────────────────── */
  .progress-section { display: none; }
  .progress-section.visible { display: block; }

  .overall-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-pct {
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
    text-shadow: 0 0 12px var(--green-glow);
  }

  .progress-speed {
    font-size: 12px;
    color: var(--muted);
  }

  .progress-bar {
    height: 6px;
    background: #111;
    overflow: hidden;
    margin-bottom: 6px;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    transition: width 0.15s linear;
    box-shadow: 0 0 10px var(--green-glow);
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 30px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2));
    animation: scan 1.5s ease-in-out infinite;
  }

  @keyframes scan {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  .progress-detail {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
  }

  .progress-section.complete .progress-fill {
    background: var(--green);
  }

  .progress-section.complete .progress-pct {
    color: var(--green);
  }

  /* ── Log ──────────────────────────────────────────── */
  .log-section { display: none; }
  .log-section.visible { display: block; }

  .log-container {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px;
    max-height: 180px;
    overflow-y: auto;
  }

  .log-entry {
    font-size: 10px;
    padding: 2px 0;
    display: flex;
    gap: 6px;
    line-height: 1.5;
  }

  .log-time { color: #333; flex-shrink: 0; }
  .log-msg { color: var(--text); word-break: break-all; }
  .log-msg.success { color: var(--green); }
  .log-msg.error { color: var(--red); }
  .log-msg.info { color: var(--muted); }
  .log-msg.warn { color: var(--amber); }
  .log-msg.system { color: var(--green); text-shadow: 0 0 4px var(--green-glow); }

  /* ── Footer ───────────────────────────────────────── */
  .footer {
    padding: 10px 16px;
    text-align: center;
    font-size: 10px;
    color: #333;
    border-top: 1px solid var(--border);
    letter-spacing: 1px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  /* ── Scrollbar ────────────────────────────────────── */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--green); }
</style>
</head>
<body>

<!-- Matrix Rain Background -->
<canvas id="matrix"></canvas>

<!-- Header -->
<div class="header">
  <div class="logo">
    <span class="logo-bracket">[</span>
    <span class="logo-text">FileDrop</span>
    <span class="logo-bracket">]</span>
    <span class="logo-ver">v0.1.0</span>
  </div>
  <div id="statusPill" class="status-pill connecting">
    <div class="status-dot"></div>
    <span id="statusText">Link...</span>
  </div>
</div>

<!-- Content -->
<div class="content">

  <div id="dropZone" class="drop-zone">
    <span class="drop-zone-icon">⬆</span>
    <div class="drop-zone-title">Initiate Transfer</div>
    <div class="drop-zone-subtitle">// tap to select files or drag-and-drop</div>
    <button class="select-btn" onclick="document.getElementById('fileInput').click()">
      &gt; Select Files
    </button>
    <input type="file" id="fileInput" class="file-input" multiple>
  </div>

  <div id="sendSection" class="send-section">
    <button id="sendBtn" class="send-btn primary" onclick="startTransfer()">
      ▶ EXECUTE TRANSFER
    </button>
    <button class="send-btn secondary" onclick="clearFiles()">✕</button>
  </div>

  <div id="queueSection" class="queue-section">
    <div class="section-header">
      <span class="section-title">Transfer Queue</span>
      <span id="queueStats" class="queue-stats"></span>
    </div>
    <div id="fileList" class="file-list"></div>
  </div>

  <div id="progressSection" class="progress-section">
    <div class="overall-progress">
      <div class="progress-header">
        <span id="progressPct" class="progress-pct">0%</span>
        <span id="progressSpeed" class="progress-speed"></span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
      </div>
      <div class="progress-detail">
        <span id="progressTransferred">0 B / 0 B</span>
        <span id="progressEta"></span>
      </div>
    </div>
  </div>

  <div id="logSection" class="log-section">
    <div class="section-header">
      <span class="section-title">System Log</span>
    </div>
    <div id="logContainer" class="log-container"></div>
  </div>
</div>

<div class="footer">
  FileDrop v0.1.0 // encrypted local transfer // no cloud // no trace
</div>

<script>
// ══════════════════════════════════════════════════════════
//  FILEDROP :: SECURE TRANSFER PROTOCOL CLIENT
//  Supports files up to 10GB+ via streaming hash + chunked send
// ══════════════════════════════════════════════════════════

const CHUNK_SIZE = 256 * 1024;       // 256KB transfer chunks
const HASH_CHUNK_SIZE = 2*1024*1024; // 2MB hash chunks (streaming)
let ws = null;
let selectedFiles = [];
let transferring = false;
let totalBytes = 0;
let totalSent = 0;
let transferStart = 0;

// ── Matrix Rain ───────────────────────────────────────────
(function initMatrix() {
  const c = document.getElementById('matrix');
  const ctx = c.getContext('2d');
  c.width = window.innerWidth;
  c.height = window.innerHeight;
  const cols = Math.floor(c.width / 14);
  const drops = new Array(cols).fill(1);
  const chars = 'ファイルドロップ01アイウエオカキクケコ';
  function draw() {
    ctx.fillStyle = 'rgba(10,10,10,0.05)';
    ctx.fillRect(0, 0, c.width, c.height);
    ctx.fillStyle = '#00FF41';
    ctx.font = '12px monospace';
    for (let i = 0; i < drops.length; i++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(ch, i * 14, drops[i] * 14);
      if (drops[i] * 14 > c.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  setInterval(draw, 50);
  window.addEventListener('resize', () => { c.width = innerWidth; c.height = innerHeight; });
})();

// ── WebSocket Connection ──────────────────────────────────

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws`;
  setStatus('connecting', 'LINK...');
  log('[SYS] Establishing connection...', 'system');

  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setStatus('connected', 'ONLINE');
    log('[SYS] Secure tunnel established ✓', 'success');
  };

  ws.onclose = () => {
    setStatus('disconnected', 'OFFLINE');
    log('[SYS] Connection terminated', 'info');
    if (!transferring) setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    setStatus('disconnected', 'ERROR');
    log('[ERR] WebSocket failure', 'error');
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      handleServerMessage(msg);
    } catch (e) {}
  };
}

function handleServerMessage(msg) {
  if (msg.type === 'file_ack') {
    if (msg.success) log('[ACK] File verified by target', 'success');
    else log(`[NAK] Rejected: ${msg.error || 'unknown'}`, 'error');
  }
}

// ── File Selection ────────────────────────────────────────

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', (e) => {
  if (e.target.tagName !== 'BUTTON') fileInput.click();
});
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

function addFiles(fileList) {
  for (const file of fileList) {
    if (selectedFiles.find(f => f.name === file.name && f.size === file.size)) continue;
    selectedFiles.push(file);
  }
  renderQueue();
}

function clearFiles() {
  if (transferring) return;
  selectedFiles = [];
  renderQueue();
}

function renderQueue() {
  const qs = document.getElementById('queueSection');
  const ss = document.getElementById('sendSection');
  const fl = document.getElementById('fileList');
  const st = document.getElementById('queueStats');

  if (selectedFiles.length === 0) {
    qs.classList.remove('visible');
    ss.classList.remove('visible');
    fl.innerHTML = '';
    return;
  }

  qs.classList.add('visible');
  if (!transferring) ss.classList.add('visible');

  const total = selectedFiles.reduce((s, f) => s + f.size, 0);
  st.textContent = `${selectedFiles.length} file${selectedFiles.length > 1 ? 's' : ''} // ${formatBytes(total)}`;

  fl.innerHTML = selectedFiles.map((file, i) => `
    <div class="file-item" id="file-${i}">
      <div class="file-info">
        <div class="file-name"><span>${escapeHtml(file.name)}</span></div>
        <span class="file-size">${formatBytes(file.size)}</span>
      </div>
      <div class="file-progress-bar">
        <div class="file-progress-fill" id="fileProg-${i}" style="width:0%"></div>
      </div>
      <div class="file-status" id="fileStatus-${i}">QUEUED</div>
    </div>
  `).join('');
}

// ── File Transfer ─────────────────────────────────────────

async function startTransfer() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { log('[ERR] No connection to target', 'error'); return; }
  if (selectedFiles.length === 0 || transferring) return;

  transferring = true;
  totalBytes = selectedFiles.reduce((s, f) => s + f.size, 0);
  totalSent = 0;
  transferStart = performance.now();

  document.getElementById('sendBtn').disabled = true;
  document.getElementById('sendSection').classList.remove('visible');
  document.getElementById('progressSection').classList.add('visible');
  document.getElementById('logSection').classList.add('visible');

  log(`[SYS] Transfer initiated: ${selectedFiles.length} targets, ${formatBytes(totalBytes)}`, 'system');

  if (selectedFiles.length > 1) {
    ws.send(JSON.stringify({ type: 'batch_start', file_count: selectedFiles.length, total_size: totalBytes }));
  }

  let ok = 0, fail = 0;

  for (let i = 0; i < selectedFiles.length; i++) {
    try { await sendFile(selectedFiles[i], i); ok++; }
    catch (err) { fail++; log(`[ERR] ${selectedFiles[i].name}: ${err.message}`, 'error'); setFileStatus(i, 'error', `ERR: ${err.message}`); }
  }

  if (selectedFiles.length > 1) {
    ws.send(JSON.stringify({ type: 'batch_done', successful: ok, failed: fail }));
  }

  transferring = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('progressSection').classList.add('complete');
  log(`[SYS] Transfer complete: ${ok} OK, ${fail} FAIL`, fail > 0 ? 'error' : 'success');
}

async function sendFile(file, index) {
  const el = document.getElementById(`file-${index}`);
  el.classList.add('active');

  // 1. STREAMING SHA-256 HASH (supports files >5GB without loading into RAM)
  setFileStatus(index, 'hashing', 'HASHING...');
  log(`[HASH] Computing SHA-256: ${file.name} (${formatBytes(file.size)})`, 'warn');

  const hasher = new SHA256Stream();
  let hashOffset = 0;
  while (hashOffset < file.size) {
    const end = Math.min(hashOffset + HASH_CHUNK_SIZE, file.size);
    const chunk = file.slice(hashOffset, end);
    const buf = await chunk.arrayBuffer();
    hasher.update(new Uint8Array(buf));
    hashOffset = end;
    const pct = (hashOffset / file.size * 100).toFixed(0);
    setFileStatus(index, 'hashing', `HASHING ${pct}%`);
  }
  const hash = hasher.finalize();
  log(`[HASH] ${file.name} -> ${hash.substring(0,16)}...`, 'info');

  // 2. FileStart
  setFileStatus(index, 'sending', 'UPLOADING...');
  ws.send(JSON.stringify({
    type: 'file_start', name: file.name, size: file.size,
    sha256: hash, mime_type: file.type || null
  }));

  // 3. Stream binary chunks
  const fileSentBefore = totalSent;
  let fileSent = 0;

  for (let offset = 0; offset < file.size; offset += CHUNK_SIZE) {
    const end = Math.min(offset + CHUNK_SIZE, file.size);
    const chunk = file.slice(offset, end);
    const buffer = await chunk.arrayBuffer();

    while (ws.bufferedAmount > CHUNK_SIZE * 8) await sleep(10);

    ws.send(buffer);
    fileSent = end;
    totalSent = fileSentBefore + fileSent;

    const pct = (fileSent / file.size * 100).toFixed(0);
    setFileProgress(index, pct);
    setFileStatus(index, 'sending', `${pct}% // ${formatBytes(fileSent)} / ${formatBytes(file.size)}`);
    updateOverallProgress();
  }

  // 4. FileDone
  ws.send(JSON.stringify({ type: 'file_done', checksum: `sha256:${hash}` }));
  setFileStatus(index, 'sending', 'VERIFYING...');

  // 5. Wait ACK
  const ack = await waitForAck(30000);

  if (ack && ack.success) {
    setFileProgress(index, 100);
    setFileStatus(index, 'done', '✓ VERIFIED');
    el.classList.remove('active');
    el.classList.add('completed');
    log(`[OK] ${file.name} delivered (${formatBytes(file.size)})`, 'success');
  } else {
    el.classList.remove('active');
    el.classList.add('failed');
    throw new Error(ack ? (ack.error || 'Rejected') : 'ACK timeout');
  }
}

function waitForAck(ms) {
  return new Promise((resolve) => {
    const t = setTimeout(() => { ws.removeEventListener('message', h); resolve(null); }, ms);
    function h(e) {
      try { const m = JSON.parse(e.data); if (m.type === 'file_ack') { clearTimeout(t); ws.removeEventListener('message', h); resolve(m); } } catch {}
    }
    ws.addEventListener('message', h);
  });
}

// ══════════════════════════════════════════════════════════
// STREAMING SHA-256 — Pure JS, works over HTTP, handles 10GB+
// Processes data incrementally, never loads full file to RAM.
// ══════════════════════════════════════════════════════════

class SHA256Stream {
  constructor() {
    this.h = new Uint32Array([0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19]);
    this.K = new Uint32Array([
      0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
      0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
      0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
      0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
      0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
      0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
      0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
      0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
    ]);
    this.W = new Uint32Array(64);
    this.buf = new Uint8Array(64);
    this.bufLen = 0;
    this.totalLen = 0;
  }

  _rr(x, n) { return (x >>> n) | (x << (32 - n)); }

  _processBlock(block, offset) {
    const W = this.W, K = this.K;
    const dv = new DataView(block.buffer, block.byteOffset + offset, 64);
    for (let i = 0; i < 16; i++) W[i] = dv.getUint32(i * 4, false);
    for (let i = 16; i < 64; i++) {
      const s0 = this._rr(W[i-15],7) ^ this._rr(W[i-15],18) ^ (W[i-15]>>>3);
      const s1 = this._rr(W[i-2],17) ^ this._rr(W[i-2],19) ^ (W[i-2]>>>10);
      W[i] = (W[i-16]+s0+W[i-7]+s1)|0;
    }
    let [a,b,c,d,e,f,g,h] = this.h;
    for (let i = 0; i < 64; i++) {
      const S1 = this._rr(e,6)^this._rr(e,11)^this._rr(e,25);
      const ch = (e&f)^(~e&g);
      const t1 = (h+S1+ch+K[i]+W[i])|0;
      const S0 = this._rr(a,2)^this._rr(a,13)^this._rr(a,22);
      const maj = (a&b)^(a&c)^(b&c);
      const t2 = (S0+maj)|0;
      h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;
    }
    this.h[0]=(this.h[0]+a)|0; this.h[1]=(this.h[1]+b)|0;
    this.h[2]=(this.h[2]+c)|0; this.h[3]=(this.h[3]+d)|0;
    this.h[4]=(this.h[4]+e)|0; this.h[5]=(this.h[5]+f)|0;
    this.h[6]=(this.h[6]+g)|0; this.h[7]=(this.h[7]+h)|0;
  }

  update(data) {
    this.totalLen += data.length;
    let offset = 0;

    // Fill partial buffer
    if (this.bufLen > 0) {
      const need = 64 - this.bufLen;
      const take = Math.min(need, data.length);
      this.buf.set(data.subarray(0, take), this.bufLen);
      this.bufLen += take;
      offset = take;
      if (this.bufLen === 64) { this._processBlock(this.buf, 0); this.bufLen = 0; }
    }

    // Process full 64-byte blocks directly from input
    while (offset + 64 <= data.length) {
      this._processBlock(data, offset);
      offset += 64;
    }

    // Buffer remainder
    if (offset < data.length) {
      this.buf.set(data.subarray(offset), 0);
      this.bufLen = data.length - offset;
    }
  }

  finalize() {
    const bitLenHi = (this.totalLen / 0x100000000) * 8;
    const bitLenLo = (this.totalLen * 8) >>> 0;

    // Padding
    this.buf[this.bufLen++] = 0x80;
    if (this.bufLen > 56) {
      this.buf.fill(0, this.bufLen, 64);
      this._processBlock(this.buf, 0);
      this.bufLen = 0;
    }
    this.buf.fill(0, this.bufLen, 56);
    const dv = new DataView(this.buf.buffer);
    dv.setUint32(56, bitLenHi >>> 0, false);
    dv.setUint32(60, bitLenLo, false);
    this._processBlock(this.buf, 0);

    return Array.from(this.h).map(v => (v>>>0).toString(16).padStart(8,'0')).join('');
  }
}

// ── UI Helpers ────────────────────────────────────────────

function setStatus(type, text) {
  const p = document.getElementById('statusPill');
  const t = document.getElementById('statusText');
  p.className = `status-pill ${type}`;
  t.textContent = text;
}

function setFileProgress(i, pct) {
  const el = document.getElementById(`fileProg-${i}`);
  if (el) el.style.width = `${pct}%`;
}

function setFileStatus(i, cls, text) {
  const el = document.getElementById(`fileStatus-${i}`);
  if (el) { el.className = `file-status ${cls}`; el.textContent = text; }
}

function updateOverallProgress() {
  const pct = totalBytes > 0 ? (totalSent / totalBytes * 100) : 0;
  const elapsed = (performance.now() - transferStart) / 1000;
  const speed = elapsed > 0 ? totalSent / elapsed : 0;
  const remaining = speed > 0 ? (totalBytes - totalSent) / speed : 0;

  document.getElementById('progressPct').textContent = `${pct.toFixed(0)}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('progressSpeed').textContent = `${formatBytes(speed)}/s`;
  document.getElementById('progressTransferred').textContent = `${formatBytes(totalSent)} / ${formatBytes(totalBytes)}`;
  document.getElementById('progressEta').textContent = remaining > 0 ? `ETA ${formatTime(remaining)}` : '';
}

function log(message, type = 'info') {
  const c = document.getElementById('logContainer');
  document.getElementById('logSection').classList.add('visible');
  const time = new Date().toLocaleTimeString('en-US', { hour12: false });
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">${time}</span><span class="log-msg ${type}">${escapeHtml(message)}</span>`;
  c.appendChild(entry);
  c.scrollTop = c.scrollHeight;
}

function formatBytes(b) {
  if (b === 0) return '0 B';
  const u = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return `${(b / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0)} ${u[i]}`;
}

function formatTime(s) {
  if (s < 60) return `${Math.ceil(s)}s`;
  const m = Math.floor(s / 60);
  return `${m}m ${Math.ceil(s % 60)}s`;
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Init ──────────────────────────────────────────────────
connect();
</script>
