name: Release

on:
  push:
    tags:
      - 'v*' # This workflow runs only when you push a tag starting with 'v' (e.g., v0.3.2)

jobs:
  build-and-upload:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: filedrop
            asset_name: filedrop-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: filedrop.exe
            asset_name: filedrop-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: filedrop
            asset_name: filedrop-macos-amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename Binary
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.asset_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
